<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-label="FlowLens 功能图标：收集图片、瀑布流、大图预览、视频支持、打包下载、本地运行">
  <defs>
