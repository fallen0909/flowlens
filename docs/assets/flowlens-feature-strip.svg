      <rect x="114" y="48" width="68" height="58" rx="12" fill="#3ad9e7" opacity=".65"/>
      <rect x="114" y="118" width="68" height="96" rx="12" fill="#f4b85d" opacity=".75"/>
      <rect x="48" y="152" width="54" height="62" rx="12" fill="#8fe3c6" opacity=".7"/>
      <text x="34" y="251" class="label">瀑布流</text>
    </g>
    <g transform="translate(520 0)">
