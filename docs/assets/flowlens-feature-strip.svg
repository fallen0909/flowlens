<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="FlowLens 功能看板：智能收集、瀑布流、大图预览、视频支持、打包下载、本地运行">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset=".55" stop-color="#eefaff"/>
      <stop offset="1" stop-color="#fff6e7"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9fbff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdfa"/>
      <stop offset="1" stop-color="#fff0d1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b5060" flood-opacity=".12"/>
    </filter>
    <style>
      .title { font: 800 48px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #102433; }
      .sub { font: 400 24px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #5f7483; }
      .emoji { font: 700 72px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
      .name { font: 800 30px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #112838; }
      .desc { font: 400 18px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #657b88; }
      .chip { font: 700 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f6d7a; }
    </style>
  </defs>

  <rect width="1600" height="520" rx="42" fill="url(#bg)"/>
  <circle cx="138" cy="110" r="74" fill="#27d7e7" opacity=".14"/>
  <circle cx="1480" cy="404" r="96" fill="#f4b85d" opacity=".18"/>
  <circle cx="1288" cy="88" r="42" fill="#52e4c7" opacity=".2"/>

  <text x="72" y="78" class="title">FlowLens 能帮你做什么？</text>
  <text x="74" y="118" class="sub">把“网页里到处散落的图”，变成“可以沉浸浏览的图片流”。</text>

  <g transform="translate(58 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardA)" stroke="#caedf4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">🧲</text>
      <text x="112" y="150" text-anchor="middle" class="name">智能收集</text>
      <text x="112" y="185" text-anchor="middle" class="desc">自动整理大图</text>
      <text x="112" y="214" text-anchor="middle" class="desc">过滤广告干扰</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#dff9fd"/>
      <text x="112" y="250" text-anchor="middle" class="chip">少点手动点图</text>
    </g>
  </g>

  <g transform="translate(306 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardB)" stroke="#f3dfb4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">🌊</text>
      <text x="112" y="150" text-anchor="middle" class="name">瀑布流</text>
      <text x="112" y="185" text-anchor="middle" class="desc">一屏看到更多</text>
      <text x="112" y="214" text-anchor="middle" class="desc">浏览不中断</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#fff3d6"/>
      <text x="112" y="250" text-anchor="middle" class="chip">像刷相册</text>
    </g>
  </g>

  <g transform="translate(554 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardA)" stroke="#caedf4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">🔍</text>
      <text x="112" y="150" text-anchor="middle" class="name">大图预览</text>
      <text x="112" y="185" text-anchor="middle" class="desc">方向键切换</text>
      <text x="112" y="214" text-anchor="middle" class="desc">原尺寸拖动</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#dff9fd"/>
      <text x="112" y="250" text-anchor="middle" class="chip">细节看清楚</text>
    </g>
  </g>

  <g transform="translate(802 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardB)" stroke="#f3dfb4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">🎬</text>
      <text x="112" y="150" text-anchor="middle" class="name">视频支持</text>
      <text x="112" y="185" text-anchor="middle" class="desc">类 GIF 视频</text>
      <text x="112" y="214" text-anchor="middle" class="desc">点开再播放</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#fff3d6"/>
      <text x="112" y="250" text-anchor="middle" class="chip">网格不乱动</text>
    </g>
  </g>

  <g transform="translate(1050 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardA)" stroke="#caedf4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">📦</text>
      <text x="112" y="150" text-anchor="middle" class="name">打包下载</text>
      <text x="112" y="185" text-anchor="middle" class="desc">收集后统一存</text>
      <text x="112" y="214" text-anchor="middle" class="desc">不用逐张保存</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#dff9fd"/>
      <text x="112" y="250" text-anchor="middle" class="chip">省时间</text>
    </g>
  </g>

  <g transform="translate(1298 172)">
    <g filter="url(#shadow)">
      <rect width="224" height="268" rx="30" fill="url(#cardB)" stroke="#f3dfb4"/>
      <text x="112" y="92" text-anchor="middle" class="emoji">🔒</text>
      <text x="112" y="150" text-anchor="middle" class="name">本地运行</text>
      <text x="112" y="185" text-anchor="middle" class="desc">浏览器内处理</text>
      <text x="112" y="214" text-anchor="middle" class="desc">不上传图片</text>
      <rect x="54" y="230" width="116" height="28" rx="14" fill="#fff3d6"/>
      <text x="112" y="250" text-anchor="middle" class="chip">更安心</text>
    </g>
  </g>
</svg>
