      <stop offset="0" stop-color="#152232"/>
      <stop offset="1" stop-color="#0c121b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19d3e6"/>
      <stop offset="1" stop-color="#f4b85d"/>
    </linearGradient>
    <style>
      .label { font: 700 30px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #eef8fc; }
      .desc { font: 400 19px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #9fb6c8; }
      .stroke { fill: none; stroke: #30d8e8; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .soft { fill: rgba(48,216,232,.12); stroke: rgba(48,216,232,.42); stroke-width: 2; }
    </style>
  </defs>
  <rect width="1600" height="360" rx="34" fill="#070b10"/>
  <g transform="translate(30 34)">
    <g transform="translate(0 0)">
      <rect width="230" height="292" rx="26" fill="url(#card)" stroke="#28445a"/>
      <rect x="56" y="55" width="48" height="62" rx="10" class="soft"/>
      <rect x="92" y="82" width="58" height="74" rx="12" class="soft"/>
      <rect x="128" y="48" width="50" height="64" rx="10" class="soft"/>
      <path d="M62 189h106M62 218h72" class="stroke"/>
