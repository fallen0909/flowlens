<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>安装瀑光 FlowLens 油猴脚本</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f7f9;
    color: #1f2328;
  }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 18px;
  }
  h1 { margin: 0 0 14px; }
  h2 { margin: 26px 0 12px; font-size: 18px; }
  a {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 0 18px;
    border-radius: 14px;
    background: #0969da;
    color: white;
    font-weight: 800;
    text-decoration: none;
    margin: 0 0 12px;
  }
  a.secondary { background: #24292f; }
  a.zhihu { background: #175199; }
  a.settings { background: #6f42c1; }
  p { line-height: 1.7; }
  .note {
    padding: 12px 14px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid #d0d7de;
  }
  .muted { color: #57606a; }
</style>
<main>
  <h1>安装瀑光 FlowLens 油猴脚本</h1>
  <p class="note"><strong>第一次安装：</strong>按下面顺序把 4 个按钮都点一遍。每点一个，Tampermonkey 页面里点“安装”或“更新”，然后返回本页继续点下一个。</p>

  <h2>必装</h2>
  <a href="./flowlens.user.js">① 安装/更新主脚本</a>
  <a class="secondary" href="./flowlens-optimizer.user.js">② 安装/更新优化补丁</a>
  <a class="settings" href="./flowlens-global-settings.user.js">③ 安装/更新全局设置同步</a>

  <h2>建议安装</h2>
  <a class="zhihu" href="./flowlens-zhihu.user.js">④ 安装/更新知乎适配</a>

  <p class="muted">以后更新时，也按这个顺序点一遍即可。知乎适配主要解决知乎首图、懒加载答案图片漏抓问题。</p>
</main>
</html>
