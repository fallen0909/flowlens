<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>安装瀑光 FlowLens 油猴脚本</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f7f9;
    color: #1f2328;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 36px 18px;
  }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 12px;
    background: #0969da;
    color: white;
    font-weight: 700;
    text-decoration: none;
    margin: 0 10px 10px 0;
  }
  a.secondary { background: #24292f; }
  a.zhihu { background: #175199; }
  a.settings { background: #6f42c1; }
  p { line-height: 1.7; }
  .note {
    padding: 12px 14px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid #d0d7de;
  }
</style>
<main>
  <h1>安装瀑光 FlowLens 油猴脚本</h1>
  <p>手机 Edge / Tampermonkey 需要先安装主脚本，再安装优化补丁。要让隐藏入口图标、主题、列数、滚动速度等设置在所有网站同步，请安装全局设置同步脚本。知乎页面如有首图或懒加载大图漏抓，再安装知乎适配。</p>
  <p>
    <a href="./flowlens.user.js">安装/更新主脚本</a>
    <a class="secondary" href="./flowlens-optimizer.user.js">安装/更新优化补丁</a>
    <a class="settings" href="./flowlens-global-settings.user.js">安装/更新全局设置同步</a>
    <a class="zhihu" href="./flowlens-zhihu.user.js">安装/更新知乎适配</a>
  </p>
  <p class="note">如果已经安装过主脚本，这次建议更新“优化补丁”，并额外安装“全局设置同步”。之后在任意一个网站改设置，其他网站会跟着使用同一套设置。</p>
</main>
