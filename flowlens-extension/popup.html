<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>瀑光 FlowLens</title>
  <style>
    body{margin:0;width:300px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#101114;color:#fff}.wrap{padding:14px}h1{font-size:18px;margin:0 0 4px}.sub{font-size:12px;color:#aaa;margin-bottom:12px}.btn{width:100%;height:40px;border:0;border-radius:12px;background:#176bff;color:#fff;font:850 14px/1 system-ui,sans-serif;cursor:pointer;margin-top:8px}.btn.secondary{background:#252932;color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.grid .btn{margin-top:0}.hint{font-size:12px;color:#aaa;line-height:1.5;margin-top:12px}.kbd{display:inline-block;padding:2px 6px;border-radius:6px;background:#262a34;color:#fff;font-weight:800}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>瀑光 FlowLens</h1>
    <div class="sub">网页图片/视频瀑布流浏览</div>
    <button id="open" class="btn">打开 / 关闭图片流</button>
    <div class="grid">
      <button id="settings" class="btn secondary">设置</button>
      <button id="help" class="btn secondary">快捷键</button>
    </div>
    <div class="hint">常用：<span class="kbd">G</span> 打开，<span class="kbd">1/2/3</span> 筛选，<span class="kbd">S</span> 选择，<span class="kbd">Shift+D</span> 下载已选。</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
