name: Zhihu dedupe v1.7.0

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/zhihu-dedupe-v170.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch duplicate media hiding and bump version
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          VERSION = '1.7.0'
          PATCH = r'''

  function normalizeMediaKey(raw) {
    if (!raw) return "";
    try {
      const url = new URL(String(raw).replace(/&amp;/g, "&"), location.href);
      const host = url.hostname.replace(/^i\d+\./i, "").toLowerCase();
      const path = decodeURIComponent(url.pathname || "").toLowerCase();
      const zh = path.match(/(?:^|\/)(v2-[a-f0-9]{16,})(?:_[^/.]+)?\.(?:jpe?g|png|webp|gif)/i);
      if (zh) return `zhimg:${zh[1].toLowerCase()}`;
      const generic = path.replace(/([_-])(?:small|middle|large|hd|origin|thumb|thumbnail|720w|1080w|1200w)(?=\.)/gi, "");
      return `${host}${generic}`;
    } catch {
      return String(raw).split(/[?#]/)[0].toLowerCase();
    }
  }
  function mediaCandidateUrl(node) {
    if (!node) return "";
    if (node.tagName === "IMG") {
      return node.currentSrc || node.src || node.getAttribute("data-original") || node.getAttribute("data-src") || node.getAttribute("src") || "";
    }
    if (node.tagName === "VIDEO") {
      return node.currentSrc || node.src || node.poster || node.querySelector?.("source[src]")?.src || "";
    }
    const media = node.querySelector?.("img,video");
    return mediaCandidateUrl(media);
  }
  function tileForMedia(media) {
    return media?.closest?.(".xiv-tile,.xiv-card,[data-xiv-media]") || null;
  }
  function dedupeVisibleMedia() {
    const root = document.getElementById("xiv-root");
    if (!root) return;
    const isZhihuPage = /(^|\.)zhihu\.com$/i.test(location.hostname) || root.querySelector('img[src*="zhimg.com"],img[src*="zhihu.com"]');
    if (!isZhihuPage) return;
    if (!document.getElementById("flowlens-dedupe-170")) {
      const style = document.createElement("style");
      style.id = "flowlens-dedupe-170";
      style.textContent = '#xiv-root .fl-dup-hidden{display:none!important}';
      document.documentElement.appendChild(style);
    }
    const seen = new Map();
    let hidden = 0;
    const tiles = Array.from(root.querySelectorAll(".xiv-tile,.xiv-card,[data-xiv-media]")).filter((tile) => tile.querySelector("img,video"));
    for (const tile of tiles) {
      const key = normalizeMediaKey(mediaCandidateUrl(tile));
      if (!key) continue;
      if (seen.has(key)) {
        tile.classList.add("fl-dup-hidden");
        tile.dataset.flDuplicateOf = key;
        hidden += 1;
      } else {
        seen.set(key, tile);
        tile.classList.remove("fl-dup-hidden");
        delete tile.dataset.flDuplicateOf;
      }
    }
    if (hidden) root.dataset.zhihuDedupeHidden = String(hidden);
  }
'''

          for file_name in ['flowlens-desktop.user.js', 'flowlens-mobile-all.user.js']:
              p = Path(file_name)
              s = p.read_text(encoding='utf-8')
              s = s.replace('// @version      1.6.9', f'// @version      {VERSION}')
              s = s.replace('const VERSION = "1.6.9";', f'const VERSION = "{VERSION}";')
              s = s.replace('page-bookmarks.js?fl=1.6.9', f'page-bookmarks.js?fl={VERSION}')
              s = s.replace('全屏按钮版：右上角新增全屏按钮，保留 xchina 加速和同步防限流。', '去重修复版：知乎图片流自动隐藏重复图片，保留全屏、xchina 加速和同步防限流。')
              s = s.replace('window.__flowLensRelease169Patch', 'window.__flowLensRelease170Patch')
              s = s.replace('"topbar-fullscreen-button"', '"topbar-fullscreen-button", "zhihu-media-dedupe"')
              if 'function dedupeVisibleMedia()' not in s:
                  idx = s.find('  function startPerformancePatch()')
                  if idx < 0:
                      raise SystemExit(f'startPerformancePatch not found in {file_name}')
                  s = s[:idx] + PATCH + s[idx:]
              s = s.replace('optimizeHeavyMedia(); ensureFullscreenButton();', 'optimizeHeavyMedia(); dedupeVisibleMedia(); ensureFullscreenButton();')
              p.write_text(s, encoding='utf-8')

          vp = Path('version.json')
          v = json.loads(vp.read_text(encoding='utf-8'))
          v['version'] = VERSION
          v.setdefault('desktop', {})['version'] = VERSION
          v.setdefault('mobile', {})['version'] = VERSION
          feats = v.setdefault('features', [])
          for f in ['zhihu-media-dedupe', 'topbar-fullscreen-button', 'fast-photo-site-mode']:
              if f not in feats:
                  feats.append(f)
          vp.write_text(json.dumps(v, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Validate
        run: |
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add flowlens-desktop.user.js flowlens-mobile-all.user.js version.json
          git commit -m "Release FlowLens v1.7.0 zhihu dedupe" || exit 0
          git push
