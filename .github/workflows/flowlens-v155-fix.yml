              'core toggle bookmark current url'
          )
          core = replace_once(
              core,
              '''          <button class="xiv-btn" type="button" data-xiv="favzip" title="下载收藏 ZIP">${icons.heart}<span>收藏</span></button>
          <button class="xiv-btn" type="button" data-xiv="links" title="导出链接">${icons.link}<span>链接</span></button>
''',
              '''          <button class="xiv-btn" type="button" data-xiv="favzip" title="下载收藏 ZIP">${icons.heart}<span>收藏</span></button>
          <button class="xiv-btn" type="button" data-xiv="page-bookmark-toggle" title="收藏本页" aria-label="收藏本页">${icons.bookmark}<span>收藏本页</span></button>
          <button class="xiv-btn" type="button" data-xiv="page-bookmark-list" title="收藏列表" aria-label="收藏列表">${icons.bookmarkList}<span>收藏列表</span></button>
          <button class="xiv-btn" type="button" data-xiv="links" title="导出链接">${icons.link}<span>链接</span></button>
''',
              'core topbar bookmark buttons'
          )
          core = replace_once(
              core,
              '''      <div id="xiv-page-bookmarks-controls" aria-label="页面收藏">
        <button type="button" data-xiv="page-bookmark-toggle">收藏本页</button>
        <button type="button" data-xiv="page-bookmark-list">收藏列表</button>
      </div>
''',
              '',
