name: Apply FlowLens v1.5.5 fix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/flowlens-v155-fix.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flowlens-v155-fix
  cancel-in-progress: false

jobs:
  apply-build-publish:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[flowlens-v155-applied]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source patch
        run: |
          python <<'PY'
          from pathlib import Path
          import json, re
          root = Path('.')
          VERSION = '1.5.5'

          def p(path): return root / path
          def read(path): return p(path).read_text(encoding='utf-8')
          def write(path, text): p(path).write_text(text, encoding='utf-8')
          def subn(text, pattern, repl, label, flags=re.S):
              text2, n = re.subn(pattern, repl, text, count=1, flags=flags)
              if n != 1:
                  raise SystemExit(f'Missing expected block: {label}')
              return text2

          data = json.loads(read('version.json'))
          data['version'] = VERSION
          data.setdefault('desktop', {})['version'] = VERSION
          data.setdefault('mobile', {})['version'] = VERSION
          feats = data.setdefault('features', [])
          for f in ['topbar-page-bookmark-icons', 'x810114-profile-bookmark-url']:
              if f not in feats: feats.append(f)
          write('version.json', json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          em = json.loads(read('flowlens-extension/manifest.json'))
          em['version'] = VERSION
          write('flowlens-extension/manifest.json', json.dumps(em, ensure_ascii=False, indent=2) + '\n')

          readme = read('README.md').replace('当前统一版本：`v1.5.4`。', f'当前统一版本：`v{VERSION}`。')
          readme = readme.replace('## 📝 近期更新\n\n### v1.5.4', '## 📝 近期更新\n\n### v1.5.5\n\n- 收藏本页、收藏列表入口改为顶部工具栏图标，电脑端和手机端不再在右侧显示文字悬浮按钮。\n- x.810114 收藏会优先保存当前个人主页地址，例如 `https://x.810114.xyz/ObserverAlphaAI`，避免只保存站点首页。\n\n### v1.5.4')
          write('README.md', readme)

          index = read('index.html')
          index = re.sub(r'<p class="note"><strong>.*?</p>', '<p class="note"><strong>当前统一版本：v1.5.5。</strong>收藏入口已并入顶部工具栏图标；x.810114 会收藏当前个人主页地址，不再只保存站点首页。</p>', index, count=1, flags=re.S)
          index = re.sub(r'安装/更新电脑油猴版 v[0-9.]+', f'安装/更新电脑油猴版 v{VERSION}', index)
          index = re.sub(r'安装/更新手机整合版 v[0-9.]+', f'安装/更新手机整合版 v{VERSION}', index)
          write('index.html', index)

          vjs = read('src/core/version.js')
          if 'topbar-page-bookmark-icons' not in vjs:
              vjs = vjs.replace('    "version-display-sync",\n    "page-bookmarks"', '    "version-display-sync",\n    "page-bookmarks",\n    "topbar-page-bookmark-icons",\n    "x810114-profile-bookmark-url"')
          write('src/core/version.js', vjs)

          core = read('src/core/flowlens-core.js')
          core = subn(core, r'    #xiv-page-bookmarks-controls \{.*?#xiv-root\[data-lightbox-active="true"\] #xiv-page-bookmarks-controls \{ display: none !important; \}\n', '''    .xiv-btn[data-xiv="page-bookmark-toggle"][data-saved="true"] {
      color: #ffb648; border-color: rgba(255,190,80,.56); background: rgba(255,190,80,.22);
    }
    .xiv-btn[data-xiv="page-bookmark-toggle"][data-saved="true"] svg {
      fill: currentColor;
    }
''', 'core bookmark css')
          if 'bookmarkList:' not in core:
              core = core.replace("    link: '<svg", "    bookmark: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 4.5h12a1 1 0 0 1 1 1v15l-7-4-7 4v-15a1 1 0 0 1 1-1Z\"/></svg>',\n    bookmarkList: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 6h11M8 12h11M8 18h11\"/><path d=\"M4.5 6h.01M4.5 12h.01M4.5 18h.01\"/></svg>',\n    link: '<svg", 1)
          if 'function currentPageBookmarkUrl()' not in core:
              helper = '''  function isX810114ProfileBookmarkUrl(url) {
    try {
      const parsed = new URL(url, location.href);
      const parts = parsed.pathname.split("/").filter(Boolean);
      return /^x\\.810114\\.xyz$/i.test(parsed.hostname)
        && parts.length === 1
        && /^[A-Za-z0-9_]{2,64}$/.test(parts[0]);
    } catch {
      return false;
    }
  }

  function currentPageBookmarkUrl() {
    const candidates = [
      state.galleryQueueCurrentUrl,
      state.galleryQueueIndex >= 0 ? state.galleryQueue[state.galleryQueueIndex] : "",
      state.collectionBase,
      activeGalleryQueueUrl(),
      document.querySelector('link[rel="canonical"]')?.href || "",
      document.querySelector('meta[property="og:url"], meta[name="og:url"]')?.getAttribute?.("content") || "",
      location.href
    ].filter(Boolean).map((url) => normalizePageBookmarkUrl(url));
    const profile = candidates.find(isX810114ProfileBookmarkUrl);
    if (profile) return profile;
    return candidates[candidates.length - 1] || normalizePageBookmarkUrl();
  }

  function setPageBookmarkButtonLabel(button, label) {
    if (!button) return;
    button.title = label;
    button.setAttribute("aria-label", label);
    const span = button.querySelector("span");
    if (span) span.textContent = label;
    else button.textContent = label;
  }

'''
              core = core.replace('  function pageBookmarkHost(url) {\n', helper + '  function pageBookmarkHost(url) {\n', 1)
          core = subn(core, r'  async function syncPageBookmarkControls\(\) \{.*?  \}\n\n  async function togglePageBookmarkFromCore', '''  async function syncPageBookmarkControls() {
    const button = state.root?.querySelector('[data-xiv="page-bookmark-toggle"]');
    if (!button) return;
    const currentUrl = currentPageBookmarkUrl();
    const saved = (await readPageBookmarks()).some((item) => normalizePageBookmarkUrl(item.url) === currentUrl);
    const label = saved ? "已收藏本页" : "收藏本页";
    button.dataset.saved = saved ? "true" : "false";
    setPageBookmarkButtonLabel(button, label);
  }

  async function togglePageBookmarkFromCore''', 'core sync bookmark')
          core = core.replace('  async function togglePageBookmarkFromCore() {\n    const currentUrl = normalizePageBookmarkUrl();', '  async function togglePageBookmarkFromCore() {\n    const currentUrl = currentPageBookmarkUrl();', 1)
          core = core.replace('          <button class="xiv-btn" type="button" data-xiv="favzip" title="下载收藏 ZIP">${icons.heart}<span>收藏</span></button>\n          <button class="xiv-btn" type="button" data-xiv="links" title="导出链接">${icons.link}<span>链接</span></button>', '          <button class="xiv-btn" type="button" data-xiv="favzip" title="下载收藏 ZIP">${icons.heart}<span>收藏</span></button>\n          <button class="xiv-btn" type="button" data-xiv="page-bookmark-toggle" title="收藏本页" aria-label="收藏本页">${icons.bookmark}<span>收藏本页</span></button>\n          <button class="xiv-btn" type="button" data-xiv="page-bookmark-list" title="收藏列表" aria-label="收藏列表">${icons.bookmarkList}<span>收藏列表</span></button>\n          <button class="xiv-btn" type="button" data-xiv="links" title="导出链接">${icons.link}<span>链接</span></button>', 1)
          core = subn(core, r'      <div id="xiv-page-bookmarks-controls" aria-label="页面收藏">\n        <button type="button" data-xiv="page-bookmark-toggle">收藏本页</button>\n        <button type="button" data-xiv="page-bookmark-list">收藏列表</button>\n      </div>\n', '', 'remove floating controls', flags=0)
          core = core.replace('      loadSavedPage(url) {\n        return loadSavedPageInPlace(url);\n      }', '      loadSavedPage(url) {\n        return loadSavedPageInPlace(url);\n      },\n      currentPageBookmarkUrl() {\n        return currentPageBookmarkUrl();\n      }', 1)
          write('src/core/flowlens-core.js', core)

          pb = read('src/patches/page-bookmarks.js')
          if 'function currentPageUrl()' not in pb:
              pb = pb.replace('  function hostOf(url) {\n', '''  function isX810114ProfileUrl(url) {
    try {
      const parsed = new URL(url, location.href);
      const parts = parsed.pathname.split("/").filter(Boolean);
      return /^x\\.810114\\.xyz$/i.test(parsed.hostname)
        && parts.length === 1
        && /^[A-Za-z0-9_]{2,64}$/.test(parts[0]);
    } catch {
      return false;
    }
  }

  function currentPageUrl() {
    const apiUrl = window.__flowLensControl?.currentPageBookmarkUrl?.();
    const candidates = [apiUrl, document.querySelector('link[rel="canonical"]')?.href || "", document.querySelector('meta[property="og:url"], meta[name="og:url"]')?.getAttribute?.("content") || "", location.href]
      .filter(Boolean).map((url) => normalizeUrl(url));
    const profile = candidates.find(isX810114ProfileUrl);
    if (profile) return profile;
    return candidates[0] || normalizeUrl();
  }

  function setIconButtonLabel(button, label) {
    if (!button) return;
    button.title = label;
    button.setAttribute("aria-label", label);
    const span = button.querySelector("span");
    if (span) span.textContent = label;
    else button.textContent = label;
  }

  function hostOf(url) {\n''', 1)
          pb = pb.replace('    return title || hostOf(location.href) || "未命名页面";', '    return title || hostOf(currentPageUrl()) || "未命名页面";')
          pb = subn(pb, r'  function currentBookmark\(\) \{.*?  \}\n\n  async function toggleCurrentBookmark', '''  function currentBookmark() {
    const url = currentPageUrl();
    return cache.find((item) => normalizeUrl(item.url) === url) || null;
  }

  async function toggleCurrentBookmark''', 'page current bookmark')
          pb = pb.replace('    const url = normalizeUrl();\n    const exists = currentBookmark();', '    const url = currentPageUrl();\n    const exists = currentBookmark();', 1)
          pb = subn(pb, r'      #xiv-page-bookmarks-controls \{.*?#xiv-root \.fl-bookmarks-list-fab svg \{ width: 18px !important; height: 18px !important; \}\n', '''      #xiv-root .fl-bookmarks-fab[data-saved="true"] {
        background: rgba(255,190,80,.22) !important;
        color: #ffb648 !important;
        border-color: rgba(255,190,80,.56) !important;
      }
      #xiv-root .fl-bookmarks-fab[data-saved="true"] svg { fill: currentColor !important; }
''', 'page bookmark button css')
          pb = subn(pb, r'  function ensureFloatingButton\(\) \{.*?  \}\n\n  function ensurePanel', '''  function ensureFloatingButton() {
    const r = root();
    if (!r) return;
    const button = r.querySelector('[data-xiv="page-bookmark-toggle"]');
    const listButton = r.querySelector('[data-xiv="page-bookmark-list"]');
    if (!button || !listButton) return;
    button.classList.add("fl-bookmarks-fab");
    listButton.classList.add("fl-bookmarks-list-fab");
    const saved = !!currentBookmark();
    const label = saved ? "已收藏本页" : "收藏本页";
    button.dataset.saved = saved ? "true" : "false";
    setIconButtonLabel(button, label);
    setIconButtonLabel(listButton, "收藏列表");
  }

  function ensurePanel''', 'page ensure topbar buttons')
          pb = subn(pb, r'  function syncButtonState\(\) \{.*?  \}\n\n  function togglePanel', '''  function syncButtonState() {
    const btn = document.querySelector("#xiv-root .fl-bookmarks-btn");
    const current = currentBookmark();
    const saved = current ? "true" : "false";
    if (btn) {
      btn.dataset.saved = saved;
      btn.title = current ? "当前页面已收藏，点击打开收藏列表" : "页面收藏";
    }
    const fab = document.querySelector("#xiv-root .fl-bookmarks-fab");
    if (fab) {
      const label = saved === "true" ? "已收藏本页" : "收藏本页";
      fab.dataset.saved = saved;
      setIconButtonLabel(fab, label);
    }
  }

  function togglePanel''', 'page sync button state')
          pb = pb.replace('.fl-bookmarks-panel, .fl-bookmarks-btn', '.fl-bookmarks-panel, .fl-bookmarks-btn, .fl-bookmarks-fab, .fl-bookmarks-list-fab')
          write('src/patches/page-bookmarks.js', pb)
          print('Applied FlowLens v1.5.5 patch')
          PY

      - name: Build and validate userscripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
          ! grep -E '@require|RuntimeLoader|eval[[:space:]]*\(' flowlens-desktop.user.js flowlens-mobile-all.user.js

      - name: Commit generated release files
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/flowlens-v155-fix.yml
          git add README.md index.html version.json src/core/version.js src/core/flowlens-core.js src/patches/page-bookmarks.js flowlens-extension/manifest.json flowlens-desktop.user.js flowlens-mobile-all.user.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release FlowLens v1.5.5 [flowlens-v155-applied]"
            git push
          fi

      - name: Build ZIP packages
        run: |
          set -e
          VERSION=$(node -p "require('./version.json').version")
          rm -rf dist release-work
          mkdir -p release-work dist
          mkdir -p release-work/flowlens-extension
          rsync -a flowlens-extension/ release-work/flowlens-extension/
          (cd release-work && zip -r "../dist/flowlens-extension-v${VERSION}.zip" flowlens-extension)
          mkdir -p release-work/flowlens-userscripts
          cp flowlens-desktop.user.js release-work/flowlens-userscripts/
          cp flowlens-mobile-all.user.js release-work/flowlens-userscripts/
          (cd release-work && zip -r "../dist/flowlens-userscripts-v${VERSION}.zip" flowlens-userscripts)
          cat > dist/README.txt <<EOF
          FlowLens release v${VERSION}

          Desktop extension:
          - unzip flowlens-extension-v${VERSION}.zip
          - Edge/Chrome -> extensions -> developer mode -> load unpacked -> choose flowlens-extension folder

          Userscripts:
          - flowlens-desktop.user.js for desktop
          - flowlens-mobile-all.user.js for mobile
          EOF

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: flowlens-release-v1.5.5
          path: dist/*

      - name: Prepare Pages files
        run: |
          rm -rf public
          mkdir -p public
          cp flowlens-mobile-all.user.js public/
          cp flowlens-desktop.user.js public/
          cp index.html public/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
