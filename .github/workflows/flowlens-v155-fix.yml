          )
          core = replace_once(
              core,
              '''      loadSavedPage(url) {
        return loadSavedPageInPlace(url);
      }
''',
              '''      loadSavedPage(url) {
        return loadSavedPageInPlace(url);
      },
      currentPageBookmarkUrl() {
        return currentPageBookmarkUrl();
      }
''',
              'control api current bookmark url'
          )
          write('src/core/flowlens-core.js', core)

          # Page bookmarks patch: share the same canonical URL and keep buttons icon-only.
          pb = read('src/patches/page-bookmarks.js')
          pb = replace_once(
              pb,
