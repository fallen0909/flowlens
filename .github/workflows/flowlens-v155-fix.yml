    setPageBookmarkButtonLabel(button, label);
  }
''',
              'core sync bookmark controls'
          )
          core = replace_once(
              core,
              '''  async function togglePageBookmarkFromCore() {
    const currentUrl = normalizePageBookmarkUrl();
