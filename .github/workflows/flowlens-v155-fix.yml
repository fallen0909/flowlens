  function isX810114ProfileBookmarkUrl(url) {
    try {
      const parsed = new URL(url, location.href);
      const parts = parsed.pathname.split("/").filter(Boolean);
      return /^x\\.810114\\.xyz$/i.test(parsed.hostname)
