name: Apply FlowLens v1.5.5 fix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/flowlens-v155-fix.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flowlens-v155-fix
  cancel-in-progress: false

jobs:
  apply-build-publish:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[flowlens-v155-applied]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply code changes
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          import re

          VERSION = "1.5.5"
          root = Path('.')

          def read(path):
              return (root / path).read_text(encoding='utf-8')

          def write(path, text):
              (root / path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f"Missing expected block: {label}")
              return text.replace(old, new, 1)

          # version.json
          manifest_path = root / 'version.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          manifest['version'] = VERSION
          manifest.setdefault('desktop', {})['version'] = VERSION
          manifest.setdefault('mobile', {})['version'] = VERSION
          features = manifest.setdefault('features', [])
          for feature in ['topbar-page-bookmark-icons', 'x810114-profile-bookmark-url']:
              if feature not in features:
                  features.append(feature)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          # extension manifest
          ext_manifest_path = root / 'flowlens-extension/manifest.json'
          ext_manifest = json.loads(ext_manifest_path.read_text(encoding='utf-8'))
          ext_manifest['version'] = VERSION
          ext_manifest_path.write_text(json.dumps(ext_manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          # README changelog/version
          readme = read('README.md')
          readme = readme.replace('当前统一版本：`v1.5.4`。', f'当前统一版本：`v{VERSION}`。')
          readme = replace_once(
              readme,
              '## 📝 近期更新\n\n### v1.5.4',
              '## 📝 近期更新\n\n### v1.5.5\n\n- 收藏本页、收藏列表入口改为顶部工具栏图标，电脑端和手机端不再在右侧显示文字悬浮按钮。\n- x.810114 收藏会优先保存当前个人主页地址，例如 `https://x.810114.xyz/ObserverAlphaAI`，避免只保存站点首页。\n\n### v1.5.4',
              'README changelog'
          )
          write('README.md', readme)

          # Install page
          index = read('index.html')
          index = re.sub(
              r'<p class="note"><strong>.*?</p>',
              '<p class="note"><strong>当前统一版本：v1.5.5。</strong>收藏入口已并入顶部工具栏图标；x.810114 会收藏当前个人主页地址，不再只保存站点首页。</p>',
              index,
              count=1,
              flags=re.S
          )
          index = re.sub(r'安装/更新电脑油猴版 v[0-9.]+', f'安装/更新电脑油猴版 v{VERSION}', index)
          index = re.sub(r'安装/更新手机整合版 v[0-9.]+', f'安装/更新手机整合版 v{VERSION}', index)
          write('index.html', index)

          # Version center features
          version_js = read('src/core/version.js')
          version_js = replace_once(
              version_js,
              '    "version-display-sync",\n    "page-bookmarks"',
              '    "version-display-sync",\n    "page-bookmarks",\n    "topbar-page-bookmark-icons",\n    "x810114-profile-bookmark-url"',
              'version features'
          )
          write('src/core/version.js', version_js)

          # Core UI/bookmark behavior
          core = read('src/core/flowlens-core.js')
          core = replace_once(
              core,
              '''    #xiv-page-bookmarks-controls {
      position: fixed; top: 66px; right: 14px; z-index: 2147483647;
      display: flex; flex-direction: column; gap: 8px; pointer-events: auto;
    }
    #xiv-page-bookmarks-controls button {
      height: 38px; padding: 0 14px; border: 0; border-radius: 999px;
      background: rgba(18,18,20,.9); color: #fff; box-shadow: 0 10px 28px rgba(0,0,0,.28);
      backdrop-filter: blur(14px); font: 900 13px/1 system-ui, sans-serif; cursor: pointer;
    }
    #xiv-root[data-theme="light"] #xiv-page-bookmarks-controls button { background: rgba(255,255,255,.92); color: #16181e; }
    #xiv-root[data-lightbox-active="true"] #xiv-page-bookmarks-controls { display: none !important; }
''',
              '''    .xiv-btn[data-xiv="page-bookmark-toggle"][data-saved="true"] {
      color: #ffb648; border-color: rgba(255,190,80,.56); background: rgba(255,190,80,.22);
    }
    .xiv-btn[data-xiv="page-bookmark-toggle"][data-saved="true"] svg {
      fill: currentColor;
    }
''',
              'core page bookmark css'
          )
          core = replace_once(
              core,
              '''    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg>',
''',
              '''    bookmark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4.5h12a1 1 0 0 1 1 1v15l-7-4-7 4v-15a1 1 0 0 1 1-1Z"/></svg>',
    bookmarkList: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h11M8 12h11M8 18h11"/><path d="M4.5 6h.01M4.5 12h.01M4.5 18h.01"/></svg>',
    link: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg>',
''',
              'core icons'
          )
          core = replace_once(
              core,
              '''  function normalizePageBookmarkUrl(url = location.href) {
    try {
      const parsed = new URL(url, location.href);
      parsed.hash = "";
      return parsed.href;
    } catch {
      return String(url || "").split("#")[0];
    }
  }

  function pageBookmarkHost(url) {
''',
              '''  function normalizePageBookmarkUrl(url = location.href) {
