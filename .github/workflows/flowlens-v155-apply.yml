name: Apply FlowLens v1.5.5

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/flowlens-v155-apply.yml'
      - 'scripts/apply-flowlens-v155.py'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch
        run: python scripts/apply-flowlens-v155.py

      - name: Build scripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js

      - name: Remove temporary release helpers
        run: |
          git rm --ignore-unmatch .github/workflows/flowlens-v155-fix.yml .github/workflows/flowlens-v155-apply.yml scripts/apply-flowlens-v155.py

      - name: Commit release files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Release FlowLens v1.5.5
          file_pattern: README.md index.html version.json src/core/version.js src/core/flowlens-core.js src/patches/page-bookmarks.js flowlens-extension/manifest.json flowlens-desktop.user.js flowlens-mobile-all.user.js .github/workflows/flowlens-v155-fix.yml .github/workflows/flowlens-v155-apply.yml scripts/apply-flowlens-v155.py
