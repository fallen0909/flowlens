name: Apply FlowLens v1.5.5

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/flowlens-v155-apply.yml'
      - 'scripts/apply-flowlens-v155.py'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply patch
        run: python scripts/apply-flowlens-v155.py

      - name: Build scripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
