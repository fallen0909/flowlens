name: Fix bookmark open v1.6.3

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-bookmark-open-v163.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch core and bump version
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          VERSION = '1.6.3'

          vpath = Path('version.json')
          v = json.loads(vpath.read_text(encoding='utf-8'))
          v['version'] = VERSION
          v.setdefault('desktop', {})['version'] = VERSION
          v.setdefault('mobile', {})['version'] = VERSION
          features = v.setdefault('features', [])
          for item in ['safe-lightweight-bookmark-panel', 'direct-bookmark-in-flow-switch']:
              if item not in features:
                  features.append(item)
          vpath.write_text(json.dumps(v, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          core_path = Path('src/core/flowlens-core.js')
          core = core_path.read_text(encoding='utf-8')
          old = '''  async function loadSavedPageInPlace(target) {
    const targetUrl = normalizedPageUrl(target);
    if (!targetUrl || !HTTP_PAGE_RE.test(targetUrl)) return false;

    let html = "";'''
          new = '''  async function loadSavedPageInPlace(target) {
    const targetUrl = normalizedPageUrl(target);
    if (!targetUrl || !HTTP_PAGE_RE.test(targetUrl)) return false;

    if (isQueueCandidateUrl(targetUrl)) {
      try {
        const switched = await loadGalleryQueueTargetInPlace(targetUrl);
        if (switched) return true;
      } catch {
        // Fall through to the generic saved-page loader.
      }
    }

    let html = "";'''
          if new not in core:
              if old not in core:
                  raise SystemExit('loadSavedPageInPlace anchor not found')
              core = core.replace(old, new, 1)
          core_path.write_text(core, encoding='utf-8')
          PY
      - name: Build userscripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
      - name: Commit release
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.json src/core/flowlens-core.js flowlens-desktop.user.js flowlens-mobile-all.user.js
          git commit -m "Release FlowLens v1.6.3 bookmark in-flow open" || exit 0
          git push
