name: Fix mobile bookmark wrapper

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-mobile-bookmark.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch mobile script
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('flowlens-mobile-all.user.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace('// @version      1.5.7', '// @version      1.5.8')
          s = s.replace('x.810114 收藏列表打开个人主页不回首页。', '收藏列表打开保持在图片流内。')
          start = s.find('  function openProfileInBrowser(url) {')
          end = s.find('  function makeButton(type, icon, title) {', start)
          if start != -1 and end != -1:
              s = s[:start] + '  function wrapSavedPageLoader() { }\n\n' + s[end:]
          s = s.replace('    wrapSavedPageLoader();\n', '')
          s = s.replace('flowLensBookmarkTopbarLeftFix157', 'flowLensBookmarkTopbarLeftFix158')
          s = s.replace('flowlens-bookmark-topbar-left-fix-157', 'flowlens-bookmark-topbar-left-fix-158')
          s = s.replace('fl157-bookmark-btn', 'fl158-bookmark-btn')
          s = s.replace('[data-fl157=', '[data-fl158=')
          s = s.replace('dataset.fl157', 'dataset.fl158')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add flowlens-mobile-all.user.js
          git commit -m "Fix mobile bookmark open in FlowLens" || exit 0
          git push
