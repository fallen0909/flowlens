name: Build release packages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'flowlens-extension/**'
      - 'mobile-userscript/**'
      - 'src/**'
      - 'scripts/build-userscripts.mjs'
      - 'version.json'
      - '.github/workflows/release-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./version.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and validate userscripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
          ! grep -E '@require|RuntimeLoader|eval[[:space:]]*\\(' flowlens-desktop.user.js flowlens-mobile-all.user.js

      - name: Build ZIP packages
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf dist release-work
          mkdir -p release-work dist

          mkdir -p release-work/flowlens-extension
          rsync -a flowlens-extension/ release-work/flowlens-extension/
          (cd release-work && zip -r "../dist/flowlens-extension-v${VERSION}.zip" flowlens-extension)

          mkdir -p release-work/flowlens-userscripts
          cp flowlens-desktop.user.js release-work/flowlens-userscripts/
          cp flowlens-mobile-all.user.js release-work/flowlens-userscripts/
          (cd release-work && zip -r "../dist/flowlens-userscripts-v${VERSION}.zip" flowlens-userscripts)

          cat > dist/README.txt <<EOF
          FlowLens release v${VERSION}

          Desktop extension:
          - unzip flowlens-extension-v${VERSION}.zip
          - Edge/Chrome -> extensions -> developer mode -> load unpacked -> choose flowlens-extension folder

          Mobile userscripts:
          - unzip flowlens-userscripts-v${VERSION}.zip
          - open install-userscript.html or install scripts from GitHub Pages if enabled
          EOF

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: flowlens-release-v${{ steps.version.outputs.version }}
          path: dist/*
