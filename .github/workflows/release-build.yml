name: Build release packages

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'flowlens-extension/**'
      - 'mobile-userscript/**'
      - 'src/**'
      - 'scripts/build-userscripts.mjs'
      - 'version.json'
      - '.github/workflows/release-build.yml'

permissions:
  contents: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release-build]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply bookmark open patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          VERSION = '1.6.3'
          p = Path('version.json')
          v = json.loads(p.read_text(encoding='utf-8'))
          v['version'] = VERSION
          v['desktop']['version'] = VERSION
          v['mobile']['version'] = VERSION
          for feature in ['safe-lightweight-bookmark-panel', 'direct-bookmark-in-flow-switch']:
              if feature not in v['features']:
                  v['features'].append(feature)
          p.write_text(json.dumps(v, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          cpath = Path('src/core/flowlens-core.js')
          s = cpath.read_text(encoding='utf-8')
          old = '''  async function loadSavedPageInPlace(target) {
    const targetUrl = normalizedPageUrl(target);
    if (!targetUrl || !HTTP_PAGE_RE.test(targetUrl)) return false;

    let html = "";'''
          new = '''  async function loadSavedPageInPlace(target) {
    const targetUrl = normalizedPageUrl(target);
    if (!targetUrl || !HTTP_PAGE_RE.test(targetUrl)) return false;

    if (isQueueCandidateUrl(targetUrl)) {
      try {
        const switched = await loadGalleryQueueTargetInPlace(targetUrl);
        if (switched) return true;
      } catch {
        // Fall through to normal saved-page loading.
      }
    }

    let html = "";'''
          if new not in s:
              if old not in s:
                  raise SystemExit('anchor not found')
              s = s.replace(old, new, 1)
          cpath.write_text(s, encoding='utf-8')
          PY

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./version.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and validate userscripts
        run: |
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js

      - name: Commit generated userscripts
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.json src/core/flowlens-core.js flowlens-desktop.user.js flowlens-mobile-all.user.js
          git commit -m "Build FlowLens userscripts v${{ steps.version.outputs.version }} [skip release-build]" || exit 0
          git push

      - name: Build ZIP packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf dist release-work
          mkdir -p release-work dist
          mkdir -p release-work/flowlens-extension
          rsync -a flowlens-extension/ release-work/flowlens-extension/
          (cd release-work && zip -r "../dist/flowlens-extension-v${VERSION}.zip" flowlens-extension)
          mkdir -p release-work/flowlens-userscripts
          cp flowlens-desktop.user.js release-work/flowlens-userscripts/
          cp flowlens-mobile-all.user.js release-work/flowlens-userscripts/
          (cd release-work && zip -r "../dist/flowlens-userscripts-v${VERSION}.zip" flowlens-userscripts)

      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: flowlens-release-v${{ steps.version.outputs.version }}
          path: dist/*
# trigger direct bookmark open build
