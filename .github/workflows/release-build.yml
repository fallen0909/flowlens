name: Verify and package FlowLens

on:
  pull_request:
  push:
    branches: [master]
    paths:
      - 'apps/extension/**'
      - 'src/**'
      - 'scripts/build-userscripts.mjs'
      - 'version.json'
      - '.github/workflows/release-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild official userscripts
        run: node scripts/build-userscripts.mjs

      - name: Require committed release files
        run: git diff --exit-code -- flowlens-desktop.user.js flowlens-mobile-all.user.js

      - name: Validate JavaScript and extension manifest
        run: |
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
          node --check apps/extension/content.js
          node --check apps/extension/background.js
          node --check apps/extension/options.js
          node --check apps/extension/popup.js
          node -e "JSON.parse(require('fs').readFileSync('apps/extension/manifest.json', 'utf8')); console.log('manifest ok')"

      - name: Package release artifacts
        run: |
          VERSION=$(node -p "require('./version.json').version")
          mkdir -p dist/flowlens-userscripts
          cp flowlens-desktop.user.js flowlens-mobile-all.user.js dist/flowlens-userscripts/
          (cd dist && zip -r "flowlens-userscripts-v${VERSION}.zip" flowlens-userscripts)
          (cd apps && zip -r "../dist/flowlens-extension-v${VERSION}.zip" extension)

      - uses: actions/upload-artifact@v4
        with:
          name: flowlens-release
          path: dist/*.zip
