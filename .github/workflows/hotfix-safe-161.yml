name: Hotfix safe v1.6.1

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/hotfix-safe-161.yml'

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make safe build
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('version.json','utf8'));
          v.version = '1.6.1';
          v.desktop.version = '1.6.1';
          v.mobile.version = '1.6.1';
          v.features = v.features.filter(x => !['direct-bookmark-in-flow-switch','x810114-profile-bookmark-metadata','compact-bookmark-panel'].includes(x));
          fs.writeFileSync('version.json', JSON.stringify(v, null, 2) + '\n');
          NODE
          node scripts/build-userscripts.mjs
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
      - name: Commit safe build
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add version.json flowlens-desktop.user.js flowlens-mobile-all.user.js
          git commit -m "Hotfix safe FlowLens v1.6.1" || exit 0
          git push
