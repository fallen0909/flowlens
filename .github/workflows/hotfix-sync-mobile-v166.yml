name: Hotfix mobile sync v1.6.6

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/hotfix-sync-mobile-v166.yml'

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch sync code and wrappers
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          VERSION = '1.6.6'
          p = Path('src/patches/page-bookmarks.js')
          s = p.read_text(encoding='utf-8')

          if 'let lastSyncError = "";' not in s:
              s = s.replace('  let lastPullAt = 0;\n', '  let lastPullAt = 0;\n  let lastSyncError = "";\n')

          start = s.index('  function b64urlEncode')
          end = s.index('  function loadSyncConfig', start)
          s = s[:start] + r'''  function b64urlEncode(text) {
    return btoa(unescape(encodeURIComponent(text))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }
  function b64urlDecode(text) {
    const clean = String(text || "").replace(/\s+/g, "").replace(/-/g, "+").replace(/_/g, "/");
    const pad = clean.length % 4 ? "=".repeat(4 - (clean.length % 4)) : "";
    return decodeURIComponent(escape(atob(clean + pad)));
  }
  function normalizeSyncCode(code) {
    return decodeURIComponent(String(code || "")).replace(/\s+/g, "").trim();
  }
  function decodeSyncCode(code) {
    const raw = normalizeSyncCode(code);
    if (!raw) return null;
    if (raw.startsWith("{")) {
      const json = safeJson(raw, null);
      if (json?.g && json?.t) return { provider: "gist", gistId: json.g, token: json.t };
      if (json?.gistId && json?.token) return { provider: "gist", gistId: json.gistId, token: json.token };
    }
    const body = raw.startsWith("FLGIST1.") ? raw.slice("FLGIST1.".length) : raw;
    const parsed = safeJson(b64urlDecode(body), null);
    if (!parsed?.g || !parsed?.t) return null;
    return { provider: "gist", gistId: parsed.g, token: parsed.t };
  }
''' + s[end:]

          start = s.index('  function requestJson')
          end = s.index('  function remotePayloadFromGist', start)
          s = s[:start] + r'''  function requestJson(method, url, body = null, token = "") {
    const headers = {
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    };
    if (token) headers.Authorization = `Bearer ${token}`;
    lastSyncError = "";
    return new Promise((resolve, reject) => {
      const fail = (message) => {
        lastSyncError = message;
        reject(new Error(message));
      };
      const handle = (status, text) => {
        const ok = Number(status || 0) >= 200 && Number(status || 0) < 300;
        const data = safeJson(text || "", null);
        if (ok) resolve(data);
        else fail(`HTTP ${status || 0}${text ? `：${String(text).slice(0, 120)}` : ""}`);
      };
      const gmRequest = typeof GM_xmlhttpRequest === "function"
        ? GM_xmlhttpRequest
        : (typeof GM !== "undefined" && typeof GM.xmlHttpRequest === "function" ? GM.xmlHttpRequest.bind(GM) : null);
      if (gmRequest) {
        gmRequest({
          method,
          url,
          headers,
          data: body ? JSON.stringify(body) : undefined,
          timeout: 30000,
          onload: (res) => handle(res.status, res.responseText || ""),
          onerror: () => fail("网络错误：无法连接 GitHub Gist"),
          ontimeout: () => fail("网络超时：无法连接 GitHub Gist")
        });
        return;
      }
      fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined })
        .then(async (res) => handle(res.status, await res.text()))
        .catch((error) => fail(error?.message || "网络错误"));
    });
  }
''' + s[end:]

          s = s.replace('''    } catch {
      if (!options.silent) status("同步失败");
      updateSyncUi("同步失败");
      return false;
    } finally {''', '''    } catch (error) {
      lastSyncError = error?.message || lastSyncError || "同步失败";
      if (!options.silent) status(`同步失败：${lastSyncError}`);
      updateSyncUi(`同步失败：${lastSyncError}`);
      return false;
    } finally {''')

          s = s.replace('''    } catch {
      updateSyncUi("上传失败");
      return false;
    } finally {''', '''    } catch (error) {
      lastSyncError = error?.message || lastSyncError || "上传失败";
      updateSyncUi(`上传失败：${lastSyncError}`);
      status(`上传失败：${lastSyncError}`);
      return false;
    } finally {''')

          start = s.index('  async function configureSync()')
          end = s.index('  function updateSyncUi', start)
          s = s[:start] + r'''  async function configureSync() {
    const current = loadSyncConfig();
    if (current?.gistId && current?.token) {
      const code = encodeSyncCode(current);
      const input = window.prompt("已开启自动同步。复制下面同步码到另一台设备；输入 clear 可关闭同步；输入新的同步码可切换。", code);
      if (input === null) return;
      if (String(input).trim().toLowerCase() === "clear") {
        saveSyncConfig(null);
        updateSyncUi("未同步");
        status("已关闭收藏同步");
        window.alert?.("已关闭收藏同步");
        return;
      }
      const next = decodeSyncCode(input);
      if (!next) {
        status("同步码格式不正确");
        window.alert?.("同步码格式不正确，请完整复制 FLGIST1 开头的同步码");
        return;
      }
      saveSyncConfig(next);
      updateSyncUi("正在验证同步码");
      const pulled = await pullSync({ silent: false });
      const pushed = pulled ? await pushSync() : false;
      if (pulled && pushed) window.alert?.("同步码已生效，手机收藏夹会自动同步。打开收藏列表时会自动拉取最新数据。");
      else window.alert?.(`同步失败：${lastSyncError || "请检查同步码、Token 权限和网络"}`);
      return;
    }
    const code = window.prompt("粘贴另一台设备的同步码；没有同步码就留空并点确定，创建新的自动同步空间。", "");
    if (code === null) return;
    const trimmed = normalizeSyncCode(code);
    if (trimmed) {
      const parsed = decodeSyncCode(trimmed);
      if (!parsed) {
        status("同步码格式不正确");
        window.alert?.("同步码格式不正确，请完整复制 FLGIST1 开头的同步码");
        return;
      }
      saveSyncConfig(parsed);
      updateSyncUi("正在验证同步码");
      const pulled = await pullSync({ silent: false });
      const pushed = pulled ? await pushSync() : false;
      if (pulled && pushed) window.alert?.("同步码已生效，手机收藏夹会自动同步。打开收藏列表时会自动拉取最新数据。");
      else window.alert?.(`同步失败：${lastSyncError || "请检查同步码、Token 权限和网络"}`);
      return;
    }
    const token = window.prompt("请输入 GitHub Token（需要 gist 权限）。只保存在本机，用来创建私有 Gist 同步收藏。", "");
    if (!token) return;
    try {
      status("正在创建同步空间");
      const config = await createRemote(token.trim());
      saveSyncConfig(config);
      await pushSync();
      window.prompt("同步已开启。复制这个同步码到手机或另一台电脑即可自动同步。", encodeSyncCode(config));
    } catch (error) {
      lastSyncError = error?.message || lastSyncError || "同步空间创建失败";
      status(`同步空间创建失败：${lastSyncError}`);
      window.alert?.(`同步空间创建失败：${lastSyncError}`);
    }
  }
''' + s[end:]

          p.write_text(s, encoding='utf-8')

          vpath = Path('version.json')
          v = json.loads(vpath.read_text(encoding='utf-8'))
          v['version'] = VERSION
          v['desktop']['version'] = VERSION
          v['mobile']['version'] = VERSION
          for f in ['page-bookmarks-auto-sync', 'mobile-sync-code-hotfix']:
              if f not in v['features']:
                  v['features'].append(f)
          vpath.write_text(json.dumps(v, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          for name in ['flowlens-desktop.user.js','flowlens-mobile-all.user.js']:
              fp = Path(name)
              t = fp.read_text(encoding='utf-8')
              t = t.replace('// @version      1.6.5', f'// @version      {VERSION}')
              t = t.replace('// @version      1.6.4', f'// @version      {VERSION}')
              t = t.replace('src/patches/page-bookmarks.js', f'src/patches/page-bookmarks.js?fl={VERSION}')
              t = t.replace('const VERSION = "1.6.5";', f'const VERSION = "{VERSION}";')
              t = t.replace('const VERSION = "1.6.4";', f'const VERSION = "{VERSION}";')
              if '// @connect      api.github.com' not in t:
                  t = t.replace('// @connect      *\n', '// @connect      *\n// @connect      api.github.com\n')
              fp.write_text(t, encoding='utf-8')
          PY
      - name: Validate
        run: |
          node --check src/patches/page-bookmarks.js
          node --check flowlens-desktop.user.js
          node --check flowlens-mobile-all.user.js
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/patches/page-bookmarks.js version.json flowlens-desktop.user.js flowlens-mobile-all.user.js
          git commit -m "Release FlowLens v1.6.6 mobile sync hotfix" || exit 0
          git push
