name: Publish FlowLens installation page

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - 'src/**'
      - 'tools/**'
      - 'version.json'
      - '.github/workflows/publish-userscripts-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Pages files
        run: |
          node tools/sync-extension-sources.mjs
          node tools/build-userscripts.mjs
          node --check flowlens-mobile-all.user.js
          rm -rf public
          mkdir -p public
          cp flowlens-mobile-all.user.js public/
          cp flowlens-desktop.user.js public/
          cp index.html public/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
