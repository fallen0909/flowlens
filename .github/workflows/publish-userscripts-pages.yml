name: Publish mobile userscripts

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile-userscript/**'
      - '.github/workflows/publish-userscripts-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages files
        run: |
          rm -rf public
          mkdir -p public
          rsync -a mobile-userscript/ public/
          cp mobile-userscript/install-userscript.html public/index.html

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = 'mobile-userscript';
          const files = [
            'flowlens.user.js',
            'flowlens-optimizer.user.js',
            'flowlens-layout-fix.user.js',
            'flowlens-edge-mask.user.js',
            'flowlens-global-settings.user.js',
            'flowlens-zhihu.user.js'
          ];
          function stripHeader(source) {
            const end = source.indexOf('// ==/UserScript==');
            return end >= 0 ? source.slice(end + '// ==/UserScript=='.length).trim() : source.trim();
          }
          const header = `// ==UserScript==
          // @name         瀑光 FlowLens 手机整合版
          // @namespace    local.flowlens.mobile.all
          // @version      1.2.22
          // @description  手机 Edge / Tampermonkey 整合版：主功能、优化补丁、布局修复、全局设置同步、知乎适配。
          // @match        *://*/*
          // @run-at       document-idle
          // @noframes
          // @grant        GM_xmlhttpRequest
          // @grant        GM_download
          // @grant        GM_getValue
          // @grant        GM_setValue
          // @connect      *
          // @updateURL    https://fallen0909.github.io/flowlens/flowlens-mobile-all.user.js
          // @downloadURL  https://fallen0909.github.io/flowlens/flowlens-mobile-all.user.js
          // ==/UserScript==`;
          const body = files
            .map((file) => stripHeader(fs.readFileSync(path.join(root, file), 'utf8')))
            .join('\n\n');
          fs.writeFileSync('public/flowlens-mobile-all.user.js', `${header}\n\n${body}\n`, 'utf8');
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
