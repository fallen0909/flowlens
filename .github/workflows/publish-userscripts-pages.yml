name: Publish mobile userscripts

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'mobile-userscript/**'
      - '.github/workflows/publish-userscripts-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages files
        run: |
          rm -rf public
          mkdir -p public
          rsync -a mobile-userscript/ public/
          cp mobile-userscript/install-userscript.html public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
